swagger: '2.0'
info:
  title: minievm - REST docs
  description: A REST interface for state queries
  version: 1.0.0
paths:
  /minievm/evm/v1/call:
    post:
      summary: Call execute entry function and return  the function result
      operationId: Call
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              response:
                type: string
                description: hex encoded response bytes.
              used_gas:
                type: string
                format: uint64
              logs:
                type: array
                items:
                  type: object
                  properties:
                    address:
                      type: string
                      title: address of the contract that generated the event
                    topics:
                      type: array
                      items:
                        type: string
                      description: list of topics provided by the contract.
                    data:
                      type: string
                      title: supplied by the contract, usually ABI-encoded
                  description: >-
                    Log represents a contract log event. These events are
                    generated by

                    the LOG opcode and stored/indexed by the node.
              trace_output:
                type: string
              error:
                type: string
            title: |-
              QueryCallResponse is the response type for the Query/Call RPC
              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              sender:
                type: string
                title: sender address
              contract_addr:
                type: string
                description: It can be cosmos address or hex encoded address.
              input:
                type: string
                title: hex encoded call input
              value:
                type: string
                description: >-
                  Value is the amount of fee denom token to transfer to the
                  contract.
              access_list:
                type: array
                items:
                  type: object
                  properties:
                    address:
                      type: string
                      description: >-
                        Address of the contract that will be accessed during the
                        transaction execution.
                    storage_keys:
                      type: array
                      items:
                        type: string
                      description: >-
                        A list of storage keys that the transaction will
                        interact with within the specified contract.

                        These keys represent specific storage slots in the
                        contract's storage that are accessed or modified.
                  description: AccessTuple is the element type of an access list.
                title: >-
                  AccessList is a predefined list of Ethereum addresses and
                  their corresponding storage slots that a transaction will
                  interact with during its execution. can be none
              trace_options:
                title: |-
                  whether to trace the call
                  `nil` means no trace
                type: object
                properties:
                  with_memory:
                    type: boolean
                    title: whether to trace memory
                  with_stack:
                    type: boolean
                    title: whether to trace stack
                  with_storage:
                    type: boolean
                    title: wtether to trace storage
                  with_return_data:
                    type: boolean
                    title: whether to return data trace
              auth_list:
                type: array
                items:
                  type: object
                  properties:
                    chain_id:
                      type: string
                    address:
                      type: string
                    nonce:
                      type: string
                      format: uint64
                    signature:
                      type: string
                      format: byte
                  description: >-
                    SetCodeAuthorization is an authorization from an account to
                    deploy code at its address.
                description: >-
                  AuthList is a list of authorizations that allow code
                  deployment at specific addresses.
            title: |-
              QueryCallRequest is the request type for the Query/Call RPC
              method
      tags:
        - Query
  /minievm/evm/v1/codes/{contract_addr}:
    get:
      summary: Code gets the module info.
      operationId: Code
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              code:
                type: string
            title: |-
              QueryCodeResponse is the response type for the Query/Code RPC
              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: contract_addr
          description: hex encoded contract address to query
          in: path
          required: true
          type: string
      tags:
        - Query
  /minievm/evm/v1/connect_oracle:
    get:
      summary: ConnectOracle gets the Connect Oracle contract address.
      operationId: ConnectOracle
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              address:
                type: string
                title: 0x prefixed hex address
            title: >-
              QueryConnectOracleResponse is the response type for the
              Query/ConnectOracle RPC

              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      tags:
        - Query
  /minievm/evm/v1/contracts/by_denom:
    get:
      summary: ContractAddrByDenom gets the contract address by denom.
      operationId: ContractAddrByDenom
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              address:
                type: string
                title: 0x prefixed hex address
            title: >-
              QueryContractAddrByDenomResponse is the response type for the
              Query/ContractAddrByDenom RPC

              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: denom
          in: query
          required: false
          type: string
      tags:
        - Query
  /minievm/evm/v1/contracts/erc20_factory:
    get:
      summary: ERC20Factory gets the ERC20Factory contract address.
      operationId: ERC20Factory
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              address:
                type: string
                title: 0x prefixed hex address
            title: >-
              QueryERC20FactoryResponse is the response type for the
              Query/ERC20Factory RPC

              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      tags:
        - Query
  /minievm/evm/v1/contracts/erc20_wrapper:
    get:
      summary: ERC20Wrapper gets the ERC20Wrapper contract address.
      operationId: ERC20Wrapper
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              address:
                type: string
                title: 0x prefixed hex address
            title: >-
              QueryERC20WrapperResponse is the response type for the
              Query/ERC20Wrapper RPC

              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      tags:
        - Query
  /minievm/evm/v1/denoms/{contract_addr}:
    get:
      summary: Denom gets the denom of the given contract address.
      operationId: Denom
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              denom:
                type: string
            title: |-
              QueryDenomResponse is the response type for the Query/Denom RPC
              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: contract_addr
          description: It can be cosmos address or hex encoded address.
          in: path
          required: true
          type: string
      tags:
        - Query
  /minievm/evm/v1/erc721/class_id/{contract_addr}:
    get:
      summary: ERC721ClassIdByContractAddr gets the class id by contract address.
      operationId: ERC721ClassIdByContractAddr
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              class_id:
                type: string
            title: >-
              QueryERC721ClassIdsByContractAddrResponse is the response type for
              the Query/ERC721ClassIdsByContractAddr RPC

              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: contract_addr
          in: path
          required: true
          type: string
      tags:
        - Query
  /minievm/evm/v1/erc721/class_infos:
    get:
      summary: ERC721ClassInfos gets the class infos.
      operationId: ERC721ClassInfos
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              class_infos:
                type: array
                items:
                  type: object
                  properties:
                    class_id:
                      type: string
                    class_name:
                      type: string
                    class_uri:
                      type: string
                    class_descs:
                      type: string
                  description: >-
                    ERC721ClassInfo defines the class information of an ERC721
                    token.
              pagination:
                description: pagination defines the pagination in the response.
                type: object
                properties:
                  next_key:
                    type: string
                    format: byte
                    description: |-
                      next_key is the key to be passed to PageRequest.key to
                      query the next page most efficiently. It will be empty if
                      there are no more results.
                  total:
                    type: string
                    format: uint64
                    title: >-
                      total is total number of results available if
                      PageRequest.count_total

                      was set, its value is undefined otherwise
            title: >-
              QueryERC721ClassInfosResponse is the response type for the
              Query/ERC721ClassInfos RPC

              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: pagination.key
          description: |-
            key is a value returned in PageResponse.next_key to begin
            querying the next page most efficiently. Only one of offset or key
            should be set.
          in: query
          required: false
          type: string
          format: byte
        - name: pagination.offset
          description: >-
            offset is a numeric offset that can be used when key is unavailable.

            It is less efficient than using key. Only one of offset or key
            should

            be set.
          in: query
          required: false
          type: string
          format: uint64
        - name: pagination.limit
          description: >-
            limit is the total number of results to be returned in the result
            page.

            If left empty it will default to a value to be set by each app.
          in: query
          required: false
          type: string
          format: uint64
        - name: pagination.count_total
          description: >-
            count_total is set to true  to indicate that the result set should
            include

            a count of the total number of items available for pagination in
            UIs.

            count_total is only respected when offset is used. It is ignored
            when key

            is set.
          in: query
          required: false
          type: boolean
        - name: pagination.reverse
          description: >-
            reverse is set to true if results are to be returned in the
            descending order.


            Since: cosmos-sdk 0.43
          in: query
          required: false
          type: boolean
      tags:
        - Query
  /minievm/evm/v1/erc721/class_infos/{class_id}:
    get:
      summary: ERC721ClassInfo gets the class info by class id.
      operationId: ERC721ClassInfo
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              class_info:
                type: object
                properties:
                  class_id:
                    type: string
                  class_name:
                    type: string
                  class_uri:
                    type: string
                  class_descs:
                    type: string
                description: >-
                  ERC721ClassInfo defines the class information of an ERC721
                  token.
            title: >-
              QueryERC721ClassInfoResponse is the response type for the
              Query/ERC721ClassInfo RPC

              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: class_id
          in: path
          required: true
          type: string
      tags:
        - Query
  /minievm/evm/v1/erc721/origin_token_infos/{class_id}:
    get:
      summary: >-
        ERC721OriginTokenInfos gets the origin token infos by class id and token
        ids.
      operationId: ERC721OriginTokenInfos
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              token_infos:
                type: array
                items:
                  type: object
                  properties:
                    token_origin_id:
                      type: string
                    token_uri:
                      type: string
                  description: >-
                    ERC721OriginTokenInfo defines the origin token information
                    of an ERC721 token.
            title: >-
              QueryERC721OriginTokenInfosResponse is the response type for the
              Query/ERC721OriginTokenInfos RPC

              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: class_id
          in: path
          required: true
          type: string
        - name: token_ids
          in: query
          required: false
          type: array
          items:
            type: string
          collectionFormat: multi
      tags:
        - Query
  /minievm/evm/v1/params:
    get:
      summary: Params queries all parameters.
      operationId: EVMParams
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              params:
                description: params defines the parameters of the module.
                type: object
                properties:
                  extra_eips:
                    type: array
                    items:
                      type: string
                      format: int64
                    title: extra_eips defines the additional EIPs for the vm.Config
                  allowed_publishers:
                    type: array
                    items:
                      type: string
                    description: >-
                      It is a list of addresses with permission to distribute
                      contracts,

                      and an empty list is interpreted as allowing anyone to
                      distribute.
                  allow_custom_erc20:
                    type: boolean
                    description: >-
                      allow_custom_erc20 defines whether the chain allows custom
                      erc20 tokens

                      to be registered on cosmos bank interface.
                  allowed_custom_erc20s:
                    type: array
                    items:
                      type: string
                  fee_denom:
                    type: string
                    title: fee_denom defines the fee denom for the evm transactions
                  gas_refund_ratio:
                    type: string
                    description: >-
                      gas_refund_ratio defines the gas refund ratio for the evm
                      transactions

                      If the gas refund ratio is 0, the gas refund is disabled.
                  num_retain_block_hashes:
                    type: string
                    format: uint64
                    description: >-
                      num_retain_block_hashes defines the number of block hashes
                      to retain

                      for the evm opcode `BLOCKHASH`.


                      minimum is 256 and 0 means no limit.
                  gas_enforcement:
                    description: >-
                      gas_enforcement specifies the rules for enforcing gas
                      usage on EVM transactions.

                      If this field is null, gas enforcement is disabled and no
                      restrictions will be applied.
                    type: object
                    properties:
                      max_gas_fee_cap:
                        type: string
                        description: >-
                          max_gas_fee_cap sets an upper bound on the gas price
                          (base fee + tip) for a single EVM transaction.

                          If set to 0, no gas price cap is enforced.
                      max_gas_limit:
                        type: string
                        format: uint64
                        description: >-
                          max_gas_limit sets the maximum gas limit allowed for a
                          single EVM transaction.

                          If set to 0, no gas limit restriction is applied.
                      unlimited_gas_senders:
                        type: array
                        items:
                          type: string
                        description: >-
                          unlimited_gas_senders is a list of addresses that are
                          exempt from gas price and limit restrictions.
            description: >-
              QueryParamsResponse is the response type for the Query/Params RPC
              method.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      tags:
        - Query
  /minievm/evm/v1/states/{contract_addr}/{key}:
    get:
      summary: State gets the state bytes of the given address and key bytes.
      operationId: State
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              value:
                type: string
                title: hex encoded hash string
            title: |-
              QueryStateResponse is the response type for the Query/State RPC
              method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
        - name: contract_addr
          description: It can be cosmos address or hex encoded address.
          in: path
          required: true
          type: string
        - name: key
          description: hex encoded hash string
          in: path
          required: true
          type: string
      tags:
        - Query
definitions:
  cosmos.base.query.v1beta1.PageRequest:
    type: object
    properties:
      key:
        type: string
        format: byte
        description: |-
          key is a value returned in PageResponse.next_key to begin
          querying the next page most efficiently. Only one of offset or key
          should be set.
      offset:
        type: string
        format: uint64
        description: |-
          offset is a numeric offset that can be used when key is unavailable.
          It is less efficient than using key. Only one of offset or key should
          be set.
      limit:
        type: string
        format: uint64
        description: >-
          limit is the total number of results to be returned in the result
          page.

          If left empty it will default to a value to be set by each app.
      count_total:
        type: boolean
        description: >-
          count_total is set to true  to indicate that the result set should
          include

          a count of the total number of items available for pagination in UIs.

          count_total is only respected when offset is used. It is ignored when
          key

          is set.
      reverse:
        type: boolean
        description: >-
          reverse is set to true if results are to be returned in the descending
          order.


          Since: cosmos-sdk 0.43
    description: |-
      message SomeRequest {
               Foo some_parameter = 1;
               PageRequest pagination = 2;
       }
    title: |-
      PageRequest is to be embedded in gRPC request messages for efficient
      pagination. Ex:
  cosmos.base.query.v1beta1.PageResponse:
    type: object
    properties:
      next_key:
        type: string
        format: byte
        description: |-
          next_key is the key to be passed to PageRequest.key to
          query the next page most efficiently. It will be empty if
          there are no more results.
      total:
        type: string
        format: uint64
        title: |-
          total is total number of results available if PageRequest.count_total
          was set, its value is undefined otherwise
    description: |-
      PageResponse is to be embedded in gRPC response messages where the
      corresponding request message has used PageRequest.

       message SomeResponse {
               repeated Bar results = 1;
               PageResponse page = 2;
       }
  google.protobuf.Any:
    type: object
    properties:
      type_url:
        type: string
      value:
        type: string
        format: byte
  grpc.gateway.runtime.Error:
    type: object
    properties:
      error:
        type: string
      code:
        type: integer
        format: int32
      message:
        type: string
      details:
        type: array
        items:
          type: object
          properties:
            type_url:
              type: string
            value:
              type: string
              format: byte
  minievm.evm.v1.AccessTuple:
    type: object
    properties:
      address:
        type: string
        description: >-
          Address of the contract that will be accessed during the transaction
          execution.
      storage_keys:
        type: array
        items:
          type: string
        description: >-
          A list of storage keys that the transaction will interact with within
          the specified contract.

          These keys represent specific storage slots in the contract's storage
          that are accessed or modified.
    description: AccessTuple is the element type of an access list.
  minievm.evm.v1.ERC721ClassInfo:
    type: object
    properties:
      class_id:
        type: string
      class_name:
        type: string
      class_uri:
        type: string
      class_descs:
        type: string
    description: ERC721ClassInfo defines the class information of an ERC721 token.
  minievm.evm.v1.ERC721OriginTokenInfo:
    type: object
    properties:
      token_origin_id:
        type: string
      token_uri:
        type: string
    description: >-
      ERC721OriginTokenInfo defines the origin token information of an ERC721
      token.
  minievm.evm.v1.GasEnforcement:
    type: object
    properties:
      max_gas_fee_cap:
        type: string
        description: >-
          max_gas_fee_cap sets an upper bound on the gas price (base fee + tip)
          for a single EVM transaction.

          If set to 0, no gas price cap is enforced.
      max_gas_limit:
        type: string
        format: uint64
        description: >-
          max_gas_limit sets the maximum gas limit allowed for a single EVM
          transaction.

          If set to 0, no gas limit restriction is applied.
      unlimited_gas_senders:
        type: array
        items:
          type: string
        description: >-
          unlimited_gas_senders is a list of addresses that are exempt from gas
          price and limit restrictions.
    description: GasEnforcement defines the gas enforcement rules for EVM transactions.
  minievm.evm.v1.Log:
    type: object
    properties:
      address:
        type: string
        title: address of the contract that generated the event
      topics:
        type: array
        items:
          type: string
        description: list of topics provided by the contract.
      data:
        type: string
        title: supplied by the contract, usually ABI-encoded
    description: |-
      Log represents a contract log event. These events are generated by
      the LOG opcode and stored/indexed by the node.
  minievm.evm.v1.Params:
    type: object
    properties:
      extra_eips:
        type: array
        items:
          type: string
          format: int64
        title: extra_eips defines the additional EIPs for the vm.Config
      allowed_publishers:
        type: array
        items:
          type: string
        description: |-
          It is a list of addresses with permission to distribute contracts,
          and an empty list is interpreted as allowing anyone to distribute.
      allow_custom_erc20:
        type: boolean
