                type: object
                properties:
                  denom:
                    type: string
                    description: denom is the denom of the token on l2 chain.
                  ibc_channel_id:
                    type: string
                    description: >-
                      ibc_channel_id is the IBC channel ID, which is allocated
                      for l1 chain, in l2 chain state.
                  ibc_port_id:
                    type: string
                    description: >-
                      ibc_port_id is the IBC port ID, which is allocated for l1
                      chain, in l2 chain state.
                description: MigrationInfo defines the information of the migration.
              ibc_denom:
