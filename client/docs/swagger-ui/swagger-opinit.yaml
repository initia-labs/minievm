        - name: denom
          in: query
          required: false
          type: string
      tags:
        - Query
  /opinit/opchild/v1/bridge_info:
    get:
      summary: BridgeInfo queries the bridge information.
      operationId: BridgeInfo
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              bridge_info:
                description: bridge_info holds all the information about the bridge.
                type: object
                properties:
                  bridge_id:
                    type: string
                    format: uint64
                    description: >-
                      bridge id is the unique identifier of the bridge which is
                      assigned from l1.
                  bridge_addr:
                    type: string
                    description: bridge_addr is the address of the bridge on l1.
                  l1_chain_id:
                    type: string
                    description: l1_chain_id is the chain id of the l1 chain.
                  l1_client_id:
                    type: string
                    description: >-
                      l1_client_id is the IBC client ID, which is allocated for
                      l1 chain, in l2 chain state.

                      This is used to verify the validator set in oracle update
                      messages.
                  bridge_config:
                    description: bridge_config is the configuration of the bridge.
                    type: object
                    properties:
                      challenger:
                        type: string
                        description: The address of the challenger.
                      proposer:
                        type: string
                        description: The address of the proposer.
                      batch_info:
                        description: The information about batch submission.
                        type: object
                        properties:
                          submitter:
                            type: string
                            description: The address of the batch submitter.
                          chain_type:
                            description: The target chain type.
                            type: string
                            enum:
                              - UNSPECIFIED
                              - INITIA
                              - CELESTIA
                            default: UNSPECIFIED
                      submission_interval:
                        type: string
                        description: >-
                          The time interval at which checkpoints must be
                          submitted.

                          NOTE: this param is currently not used, but will be
                          used for challenge in future.
                      finalization_period:
                        type: string
                        description: >-
                          The minimum time duration that must elapse before a
                          withdrawal can be finalized.
                      submission_start_height:
                        type: string
                        format: uint64
                        description: The the first l2 block will be recorded on l1.
                      oracle_enabled:
                        type: boolean
                        description: oracle_enabled is a flag to enable oracle.
                      metadata:
                        type: string
                        format: byte
                        description: >-
                          Normally it is IBC channelID for permissioned IBC
                          relayer.

                          DEPRECATED: This field is deprecated and kept for
                          backward compatibility.

                          Use channel_id instead.
                      bridge_disabled:
                        type: boolean
                        description: bridge_disabled is a flag to disable the bridge.
                      bridge_disabled_at:
                        type: string
                        format: date-time
                        description: >-
                          bridge_disabled_at is the timestamp when the bridge is
                          disabled.
                      attestor_set:
                        type: array
                        items:
                          type: object
                          properties:
                            operator_address:
                              type: string
                              description: The validator operator address of the attestor.
                            consensus_pubkey:
                              type: object
                              properties:
